    /* Contenedor principal con sidebar */
    .container {
        display: flex;
        max-width: 1200px;
        margin: 40px auto;
        gap: 30px;
    }

    /* Sidebar izquierdo grande */
    .sidebar {
        flex: 2; /* más ancho que antes */
        background: #fff;
        padding: 30px 40px;

    }

    .sidebar ul {
        list-style: none;
        padding-left: 0;
    }

    .sidebar li {
        margin: 20px 0;
        font-size: 1.3em; /* más grande */
    }

    .sidebar li a {
        text-decoration: none;
        color: #2980b9;
        font-weight: bold;
        transition: color 0.3s;
    }

    .sidebar li a:hover {
        color: #e74c3c;
    }

    /* Contenido principal vacío por ahora */
    .main {
        flex: 3; /* menor ancho que la sidebar ahora */
        background: #fff;
        padding: 30px 40px;
        border-radius: 10px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    /* Responsive */
    @media (max-width: 900px) {
        .container {
            flex-direction: column;
        }
        .sidebar {
            position: static;
            margin-bottom: 20px;
        }
    }
</style>
